# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # The number of CPUs allocated to each instance. A value of 2 provides more power for cold starts.
  cpu: 2
  # The amount of memory in MiB allocated to each instance. 1024MiB provides more room for the app to start.
  memoryMiB: 1024
  # The maximum number of requests that can be processed concurrently.
  concurrency: 80
  # The maximum number of instances that can be spun up in response to traffic.
  maxInstances: 10
  # The minimum number of instances to keep running. Set to 1 to avoid cold starts and improve responsiveness.
  minInstances: 1
